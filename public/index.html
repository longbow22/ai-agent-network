<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent Network</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d12; --surface: #13131a; --card: #1a1a24;
      --border: rgba(255,255,255,0.07); --border-strong: rgba(255,255,255,0.13);
      --text: #e8e8f0; --muted: #888899; --subtle: #333344;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 24px 16px 48px;
    }
    header { text-align: center; margin-bottom: 28px; }
    header h1 { font-size: 21px; font-weight: 600; color: #fff; margin-bottom: 5px; letter-spacing: -.3px; }
    header p { font-size: 13px; color: var(--muted); }
    .container { width: 100%; max-width: 860px; display: flex; flex-direction: column; gap: 14px; }
    .section-label { font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .roster-group { margin-bottom: 4px; }
    .roster { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
    .agent-card { background: var(--card); border: 1px solid var(--border); border-radius: 11px; padding: 11px; transition: border-color 0.2s, border-width 0.2s; }
    .agent-card.active { border-width: 1.5px; }
    .agent-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .avatar { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; color: #fff; flex-shrink: 0; letter-spacing: .3px; }
    .agent-name { font-size: 11px; font-weight: 600; color: #fff; }
    .agent-role { font-size: 10px; color: var(--muted); margin-bottom: 7px; }
    .agent-status { display: flex; align-items: center; gap: 5px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--subtle); flex-shrink: 0; transition: background .2s; }
    .dot.thinking { animation: pu 1s infinite; }
    @keyframes pu { 0%,100%{opacity:1} 50%{opacity:.25} }
    .status-label { font-size: 10px; color: var(--muted); }
    .feed { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; min-height: 360px; max-height: 460px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth; }
    .feed::-webkit-scrollbar { width: 3px; }
    .feed::-webkit-scrollbar-thumb { background: var(--subtle); border-radius: 2px; }
    .empty-state { margin: auto; text-align: center; }
    .empty-state p { font-size: 13px; color: var(--muted); line-height: 1.8; margin-bottom: 14px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .chip { background: var(--card); border: 1px solid var(--border-strong); border-radius: 999px; padding: 5px 13px; font-size: 11px; color: var(--muted); cursor: pointer; transition: border-color .15s, color .15s; }
    .chip:hover { border-color: rgba(255,255,255,.28); color: var(--text); }
    .user-msg { display: flex; justify-content: flex-end; }
    .user-bubble { background: var(--card); border: 1px solid var(--border-strong); border-radius: 13px; padding: 8px 14px; max-width: 75%; font-size: 14px; color: var(--text); line-height: 1.5; }
    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: #fff; flex-shrink: 0; letter-spacing: .4px; }
    .msg-body { flex: 1; min-width: 0; }
    .msg-header { font-size: 10px; color: var(--muted); margin-bottom: 5px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; }
    .msg-content { font-size: 14px; line-height: 1.7; color: var(--text); word-break: break-word; }
    .msg-content strong { color: #fff; font-weight: 600; }
    .msg-content pre { background: #09090f; border: 1px solid rgba(255,255,255,.08); border-radius: 8px; padding: 12px 16px; overflow-x: auto; font-family: 'Menlo','Monaco','Courier New',monospace; font-size: 12px; margin: 10px 0; line-height: 1.65; color: #c9d1d9; white-space: pre-wrap; }
    .lang-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; margin-bottom: 6px; letter-spacing: .5px; text-transform: uppercase; }
    .thinking-dots { display: flex; gap: 4px; padding: 4px 0; }
    .thinking-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--subtle); animation: bo 1.2s infinite; }
    .thinking-dots span:nth-child(2) { animation-delay: .2s; }
    .thinking-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bo { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    /* Published page banner */
    .published-banner {
      display: flex; align-items: center; gap: 12px;
      background: rgba(29,158,117,0.12); border: 1px solid rgba(29,158,117,0.3);
      border-radius: 10px; padding: 12px 16px; margin-top: 8px;
    }
    .published-banner .pub-icon { font-size: 18px; flex-shrink: 0; }
    .published-banner .pub-text { flex: 1; }
    .published-banner .pub-label { font-size: 11px; color: #6ee7b7; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 3px; }
    .published-banner .pub-link { font-size: 13px; color: #fff; word-break: break-all; }
    .published-banner .pub-link a { color: #34d399; text-decoration: none; }
    .published-banner .pub-link a:hover { text-decoration: underline; }
    .open-btn { background: #1D9E75; color: #fff; border: none; border-radius: 8px; padding: 7px 14px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: inherit; transition: opacity .15s; }
    .open-btn:hover { opacity: .85; }

    /* Published pages panel */
    .pages-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
    .pages-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .pages-list { display: flex; flex-direction: column; gap: 8px; }
    .page-row { display: flex; align-items: center; gap: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; }
    .page-row-name { flex: 1; font-size: 13px; color: var(--text); text-transform: capitalize; }
    .page-row a { font-size: 12px; color: #34d399; text-decoration: none; }
    .page-row a:hover { text-decoration: underline; }
    .del-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; transition: color .15s, background .15s; }
    .del-btn:hover { color: #f87171; background: rgba(248,113,113,.1); }
    .no-pages { font-size: 13px; color: var(--muted); text-align: center; padding: 8px 0; }

    .err-box { padding: 12px 16px; background: rgba(220,50,50,.1); border: 1px solid rgba(220,50,50,.22); border-radius: 10px; font-size: 13px; color: #f87171; }
    .input-bar { display: flex; gap: 8px; }
    .input-bar input { flex: 1; background: var(--surface); border: 1px solid var(--border-strong); border-radius: 10px; padding: 10px 14px; font-size: 14px; color: var(--text); outline: none; font-family: inherit; transition: border-color .15s; }
    .input-bar input::placeholder { color: #444455; }
    .input-bar input:focus { border-color: rgba(255,255,255,.22); }
    .input-bar button { background: #fff; color: #000; border: none; border-radius: 10px; padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .15s; }
    .input-bar button:hover { opacity: .86; }
    .input-bar button:disabled { opacity: .32; cursor: not-allowed; }
    @media(max-width:500px) { .roster { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>
<body>

<header>
  <h1>AI Agent Network</h1>
  <p>NEXUS orchestrates your team — WEBCRAFT pages are published live automatically.</p>
</header>

<div class="container">

  <div class="roster-group">
    <div class="section-label">Creative Agents</div>
    <div class="roster" id="roster-creative"></div>
  </div>

  <div class="roster-group">
    <div class="section-label">Code Agents</div>
    <div class="roster" id="roster-code"></div>
  </div>

  <div class="feed" id="feed">
    <div class="empty-state">
      <p>The network is standing by. Ask for a webpage and it will be published live automatically.</p>
      <div class="chips">
        <button class="chip" onclick="quick('Build a landing page for a yoga studio')">Landing page — yoga studio ↗</button>
        <button class="chip" onclick="quick('Build a landing page for a coffee shop with menu and contact form')">Landing page — coffee shop ↗</button>
        <button class="chip" onclick="quick('Build a portfolio page for a freelance photographer')">Portfolio — photographer ↗</button>
        <button class="chip" onclick="quick('Write a Python web scraper that saves results to CSV')">Python web scraper ↗</button>
        <button class="chip" onclick="quick('Create social media ads for a fitness brand')">Ad campaign — fitness brand ↗</button>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <input id="inp" type="text"
      placeholder='e.g. "Build a landing page for my bakery"'
      onkeydown="if(event.key==='Enter')go()" />
    <button id="sb" onclick="go()">Send ↗</button>
  </div>

  <!-- Published Pages Panel -->
  <div class="pages-panel">
    <div class="pages-panel-header">
      <div class="section-label" style="margin-bottom:0">Published Pages</div>
      <span style="font-size:11px;color:var(--muted)" id="page-count"></span>
    </div>
    <div class="pages-list" id="pages-list">
      <div class="no-pages">No pages published yet — ask WEBCRAFT to build one!</div>
    </div>
  </div>

</div>

<script>
const AG = {
  nexus: { id:'nexus', name:'NEXUS', role:'Orchestrator', init:'NX', color:'#7F77DD', group:'creative',
    sys:`You are NEXUS, an AI orchestrator managing a creative and coding agency team.
Output ONLY valid JSON — no markdown fences, no extra text:
{"summary":"one sentence plan","steps":[{"agent":"AGENT_ID","task":"specific instruction","receives_previous":false}]}

Available agents:
CREATIVE:
  "web"      = WEBCRAFT  — builds complete, beautiful HTML/CSS/JS webpages (these get published live automatically)
  "content"  = FORGE     — writes articles, copy, product descriptions, scripts
  "ad"       = AMPLIFY   — ad campaigns, social media content, email marketing
CODE:
  "python"   = PYCRAFT   — Python scripts, APIs, data science, automation
  "cpp"      = COREPP    — C++ programs, algorithms, systems
  "csharp"   = SHARPE    — C#, .NET, ASP.NET, Unity, REST APIs
  "js"       = JSFLOW    — JavaScript/TypeScript, Node.js, React
  "sql"      = DATALINK  — SQL queries, schema design, stored procedures
  "bash"     = SHELLEX   — Bash/shell scripts, Linux automation, CI/CD

Rules: Only include needed agents. Set receives_previous:true if an agent needs prior output. Order logically.`
  },
  web: { id:'web', name:'WEBCRAFT', role:'Web Builder', init:'WC', color:'#1D9E75', group:'creative',
    sys:`You are WEBCRAFT, an expert web developer. Build beautiful, complete, self-contained HTML pages.
CRITICAL: Your entire response must be structured as:
1. One sentence intro
2. The complete page inside a \`\`\`html code block — this is the code that gets published live
3. One sentence closing note

Use modern CSS, Google Fonts via @import, attractive layout, all styles inline. Make it production-ready and genuinely beautiful.
If given content from FORGE, incorporate it faithfully into the design.`
  },
  content: { id:'content', name:'FORGE', role:'Content Creator', init:'FG', color:'#639922', group:'creative',
    sys:`You are FORGE, a creative content specialist. Write compelling, well-structured copy.
If your output goes to WEBCRAFT, label sections clearly: # Hero Headline, ## Tagline, ## About, ## Services, ## CTA. Be concise but powerful.`
  },
  ad: { id:'ad', name:'AMPLIFY', role:'Ad Specialist', init:'AM', color:'#BA7517', group:'creative',
    sys:`You are AMPLIFY, an advertising expert. Create targeted, compelling campaigns. Provide 2-3 variations (Version A/B). Include headline, body copy, CTA. Add a brief strategic note.`
  },
  python: { id:'python', name:'PYCRAFT', role:'Python', init:'PY', color:'#3b82f6', group:'code',
    sys:`You are PYCRAFT, a Python expert. Write clean, modern, well-commented Python (3.10+) with type hints, docstrings, and proper error handling. Format: intro, \`\`\`python code block, usage notes.`
  },
  cpp: { id:'cpp', name:'COREPP', role:'C++', init:'C+', color:'#ef4444', group:'code',
    sys:`You are COREPP, a C++17/20 expert. Write clean, efficient modern C++ with smart pointers, const correctness, RAII, and STL. Format: intro, \`\`\`cpp code block, compilation and usage notes.`
  },
  csharp: { id:'csharp', name:'SHARPE', role:'C#', init:'C#', color:'#8b5cf6', group:'code',
    sys:`You are SHARPE, a C#/.NET expert. Write clean modern C# (10+) with nullable types, async/await, LINQ, XML doc comments. Format: intro, \`\`\`csharp code block, dependency notes.`
  },
  js: { id:'js', name:'JSFLOW', role:'JS / TypeScript', init:'TS', color:'#f59e0b', group:'code',
    sys:`You are JSFLOW, a JavaScript/TypeScript expert. Prefer TypeScript. Use async/await, modern ES2022+ syntax. Format: intro, \`\`\`typescript code block, usage notes.`
  },
  sql: { id:'sql', name:'DATALINK', role:'SQL / Database', init:'DB', color:'#06b6d4', group:'code',
    sys:`You are DATALINK, a SQL and database design expert. Write clean, optimized SQL. Note dialect differences. Include schema before queries. Format: intro, \`\`\`sql code block, performance notes.`
  },
  bash: { id:'bash', name:'SHELLEX', role:'Bash / Shell', init:'SH', color:'#10b981', group:'code',
    sys:`You are SHELLEX, a Bash expert. Write robust scripts with #!/usr/bin/env bash, set -euo pipefail, quoted variables, comments. Format: intro, \`\`\`bash code block, chmod and usage instructions.`
  }
};

const LANG_COLORS = {
  python: { bg:'rgba(59,130,246,.15)', text:'#93c5fd' },
  cpp:    { bg:'rgba(239,68,68,.15)',  text:'#fca5a5' },
  csharp: { bg:'rgba(139,92,246,.15)',text:'#c4b5fd' },
  js:     { bg:'rgba(245,158,11,.15)',text:'#fcd34d' },
  sql:    { bg:'rgba(6,182,212,.15)', text:'#67e8f9' },
  bash:   { bg:'rgba(16,185,129,.15)',text:'#6ee7b7' },
};

let busy = false;
let currentRequest = '';

function buildRoster(groupId, containerId) {
  const el = document.getElementById(containerId);
  Object.values(AG).filter(a => a.group === groupId).forEach(a => {
    const d = document.createElement('div');
    d.className = 'agent-card'; d.id = 'c' + a.id;
    d.innerHTML = `<div class="agent-top"><div class="avatar" style="background:${a.color}">${a.init}</div><span class="agent-name">${a.name}</span></div><div class="agent-role">${a.role}</div><div class="agent-status"><span class="dot" id="d${a.id}"></span><span class="status-label" id="s${a.id}">idle</span></div>`;
    el.appendChild(d);
  });
}
buildRoster('creative','roster-creative');
buildRoster('code','roster-code');

function setS(id, st) {
  const dot = document.getElementById('d'+id), lbl = document.getElementById('s'+id), card = document.getElementById('c'+id);
  if (!dot) return;
  dot.className = 'dot' + (st==='thinking' ? ' thinking' : '');
  dot.style.background = st==='thinking' ? AG[id].color : st==='done' ? '#4ade80' : 'var(--subtle)';
  lbl.textContent = st;
  lbl.style.color = st==='thinking' ? AG[id].color : st==='done' ? '#4ade80' : 'var(--muted)';
  card.classList.toggle('active', st==='thinking');
  card.style.borderColor = st==='thinking' ? AG[id].color : '';
}
function resetAll() { Object.keys(AG).forEach(id => setS(id,'idle')); }

const feed = document.getElementById('feed');
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmt(agentId, text) {
  const lc = LANG_COLORS[agentId];
  const parts = text.split(/(```[\s\S]*?```)/g);
  return parts.map(p => {
    if (p.startsWith('```')) {
      const code = p.replace(/^```[\w#+-]*\n?/,'').replace(/\n?```\s*$/,'').trim();
      const langMatch = p.match(/^```([\w#+-]+)/);
      const langLabel = lc && langMatch ? `<span class="lang-tag" style="background:${lc.bg};color:${lc.text}">${langMatch[1]}</span><br>` : '';
      return `${langLabel}<pre>${esc(code)}</pre>`;
    }
    return esc(p).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  }).join('');
}

function addUserMsg(t) {
  const d = document.createElement('div'); d.className='user-msg';
  d.innerHTML = `<div class="user-bubble">${esc(t)}</div>`;
  feed.appendChild(d); feed.scrollTop = feed.scrollHeight;
}

function addThinking(id) {
  const a = AG[id], d = document.createElement('div');
  d.className = 'msg'; d.id = 'th'+id;
  d.innerHTML = `<div class="msg-avatar" style="background:${a.color}">${a.init}</div><div class="msg-body"><div class="msg-header">${a.name} · ${a.role}</div><div class="thinking-dots"><span></span><span></span><span></span></div></div>`;
  feed.appendChild(d); feed.scrollTop = feed.scrollHeight;
}

function replaceThinking(id, text, extraHtml='') {
  const d = document.getElementById('th'+id);
  if (!d) return;
  const a = AG[id];
  d.innerHTML = `<div class="msg-avatar" style="background:${a.color}">${a.init}</div><div class="msg-body"><div class="msg-header">${a.name} · ${a.role}</div><div class="msg-content">${fmt(id,text)}</div>${extraHtml}</div>`;
  feed.scrollTop = feed.scrollHeight;
}

function addErr(msg) {
  const d = document.createElement('div'); d.className='err-box';
  d.textContent = 'Error: ' + msg; feed.appendChild(d); feed.scrollTop = feed.scrollHeight;
}

function makeSlug(text) {
  const clean = text.toLowerCase().replace(/[^a-z0-9\s]/g,'').trim().replace(/\s+/g,'-').substring(0, 45);
  return clean + '-' + Date.now().toString(36);
}

async function publishPage(html, slug) {
  const res = await fetch('/api/publish', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ html, slug })
  });
  return await res.json();
}

function publishedBanner(url) {
  const full = window.location.origin + url;
  return `<div class="published-banner">
    <div class="pub-icon">🌐</div>
    <div class="pub-text">
      <div class="pub-label">✓ Page Published Live</div>
      <div class="pub-link"><a href="${url}" target="_blank">${full}</a></div>
    </div>
    <button class="open-btn" onclick="window.open('${url}','_blank')">Open ↗</button>
  </div>`;
}

async function loadPages() {
  try {
    const res = await fetch('/api/pages');
    const data = await res.json();
    renderPages(data.pages || []);
  } catch(e) { /* silently fail */ }
}

function renderPages(pages) {
  const list = document.getElementById('pages-list');
  const count = document.getElementById('page-count');
  count.textContent = pages.length ? `${pages.length} page${pages.length>1?'s':''}` : '';
  if (!pages.length) {
    list.innerHTML = '<div class="no-pages">No pages published yet — ask WEBCRAFT to build one!</div>';
    return;
  }
  list.innerHTML = pages.map(p => `
    <div class="page-row" id="row-${p.slug}">
      <div class="page-row-name">${esc(p.name)}</div>
      <a href="${p.url}" target="_blank">View ↗</a>
      <button class="del-btn" onclick="deletePage('${p.slug}')" title="Delete">✕</button>
    </div>`).join('');
}

async function deletePage(slug) {
  await fetch('/api/pages/' + slug, { method: 'DELETE' });
  loadPages();
}

async function apiCall(agentId, userMsg) {
  setS(agentId, 'thinking'); addThinking(agentId);
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:2000, system:AG[agentId].sys, messages:[{role:'user',content:userMsg}] })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  const text = (data.content||[]).map(b=>b.text||'').join('');
  setS(agentId, 'done');
  return text;
}

async function go() {
  if (busy) return;
  const inp = document.getElementById('inp');
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value = ''; busy = true;
  currentRequest = txt;
  document.getElementById('sb').disabled = true;
  feed.innerHTML = ''; resetAll(); addUserMsg(txt);

  try {
    const planRaw = await apiCall('nexus', `User request: "${txt}"\n\nCreate an execution plan.`);
    let plan;
    try {
      const cl = planRaw.replace(/```json\n?|```\n?/g,'').trim();
      plan = JSON.parse(cl.slice(cl.indexOf('{'), cl.lastIndexOf('}')+1));
    } catch(e) { replaceThinking('nexus', planRaw); busy=false; document.getElementById('sb').disabled=false; return; }

    const names = (plan.steps||[]).map(s=>AG[s.agent]?.name||s.agent).join(' → ');
    replaceThinking('nexus', `**Plan:** ${plan.summary}\n\n**Routing to:** ${names}`);

    let prev = '';
    for (const step of (plan.steps||[])) {
      if (!AG[step.agent]) continue;
      let prompt = step.task;
      if (step.receives_previous && prev) prompt += `\n\n---\nFrom previous agent:\n${prev}\n---`;
      const out = await apiCall(step.agent, prompt);

      // Auto-publish if WEBCRAFT produced HTML
      if (step.agent === 'web') {
        const htmlMatch = out.match(/```html\n?([\s\S]*?)```/);
        if (htmlMatch) {
          const slug = makeSlug(currentRequest);
          const pub = await publishPage(htmlMatch[1].trim(), slug);
          if (pub.url) {
            replaceThinking('web', out, publishedBanner(pub.url));
            loadPages();
            prev = out; continue;
          }
        }
      }

      replaceThinking(step.agent, out);
      prev = out;
    }
  } catch(err) {
    Object.keys(AG).forEach(id=>{const el=document.getElementById('th'+id);if(el)el.remove();});
    addErr(err.message); resetAll();
  }
  busy = false; document.getElementById('sb').disabled = false;
}

function quick(txt) { document.getElementById('inp').value = txt; go(); }

// Load published pages on startup
loadPages();
</script>
</body>
</html>
